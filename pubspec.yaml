name: fuel_pit
description: "App Fuel Pit - A fuel price comparison app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.15.2
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3
  http: ^1.6.0
  geolocator: ^14.0.3
  geocoding: ^4.0.0
  provider: ^6.0.0
  google_sign_in: ^7.2.0
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/intro.mp4
    - assets/images/fuel_news_placeholder.png
    - assets/vehicles/brands_models.json
    - assets/vehicles/vehicle_types.json