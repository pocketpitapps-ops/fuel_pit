name: Flutter CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build APK (release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: flutter build apk --release

      - name: Rename APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/fuel-pit-${GITHUB_REF_NAME}.apk

      - name: Upload APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: fuel-pit-release
          path: build/app/outputs/flutter-apk/fuel-pit-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/fuel-pit-${{ github.ref_name }}.apk
          generate_release_notes: true
